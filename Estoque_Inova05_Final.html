
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inova Estoque</title>

<style>

body{
font-family:Segoe UI;
background:#f4f7f6;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
border-radius:10px;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid #008d4c;
margin-bottom:20px;
}

h2{color:#008d4c;margin:0}

.top-buttons button{
padding:10px 15px;
margin-left:5px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
color:white;
}

.btn-estoque{background:#008d4c}
.btn-historico{background:#6c757d}
.btn-add{background:#0056b3}
.btn-save{background:#28a745}

#search{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#008d4c;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
}

.low{
background:#d9534f;
color:white;
padding:3px;
border-radius:4px;
}

.hidden{display:none}

</style>

</head>

<body>

<div class="container">

<header>

<div>
<h2>Inova Informática</h2>
<small>Sistema de Estoque</small>
</div>

<div class="top-buttons">
<button class="btn-estoque" onclick="showEstoque()">📦 Estoque</button>
<button class="btn-historico" onclick="showHistorico()">📊 Histórico</button>
<button class="btn-add" onclick="addRow()">+ Item</button>
<button class="btn-save" onclick="pushData()">Salvar</button>
</div>

</header>

<input type="text" id="search" placeholder="Pesquisar..." onkeyup="filterTable()">

<!-- ESTOQUE -->
<div id="estoqueView">
<table id="table">
<thead>
<tr>
<th>Código</th><th>Produto</th><th>Marca</th>
<th>Custo</th><th>Lances</th><th>Total</th>
<th>Valor</th><th>Mín</th><th>Status</th><th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- HISTÓRICO -->
<div id="historicoView" class="hidden">
<h3>Histórico de Salvamentos</h3>
<table>
<thead>
<tr><th>Data</th><th>Itens</th></tr>
</thead>
<tbody id="histBody"></tbody>
</table>
</div>

</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbzOHa0XdhTQFhU2Z6soNAOT6r5ViJo0ZlUIOpVfRLo-jIIlgMWiL9pNN996-T6XqA77/exec";

function showEstoque(){
document.getElementById("estoqueView").classList.remove("hidden");
document.getElementById("historicoView").classList.add("hidden");
}

function showHistorico(){
document.getElementById("estoqueView").classList.add("hidden");
document.getElementById("historicoView").classList.remove("hidden");
loadHistorico();
}

async function loadHistorico(){
const r=await fetch(WEB_APP_URL+"?action=historico");
const data=await r.json();

const body=document.getElementById("histBody");
body.innerHTML="";

data.forEach(i=>{
body.innerHTML+=`<tr><td>${new Date(i[0]).toLocaleString()}</td><td>${i[1]}</td></tr>`;
});
}

async function pullData(){
const r=await fetch(WEB_APP_URL+"?action=ler");
const data=await r.json();

const tbody=document.querySelector("#table tbody");
tbody.innerHTML="";

data.forEach(i=>{
insertRow(i[0],i[1],i[2],i[3],i[4],i[5],i[6]);
});
}

async function pushData(){

const rows=document.querySelectorAll("#table tbody tr");

const data=[...rows].map(r=>[
r.cells[0].innerText,
r.cells[1].innerText,
r.cells[2].innerText,
r.cells[3].innerText,
r.cells[4].innerText,
r.cells[7].innerText,
r.cells[8].innerText
]);

await fetch(WEB_APP_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({dados:data})
});

alert("Salvo com sucesso");
}

function insertRow(c,p,m,custo,l,min,obs){

const tbody=document.querySelector("#table tbody");

const r=tbody.insertRow();

r.innerHTML=`
<td contenteditable>${c||""}</td>
<td contenteditable>${p||""}</td>
<td contenteditable>${m||""}</td>
<td contenteditable oninput="calc()">${custo||0}</td>
<td contenteditable oninput="parseLances(this)">${l||0}</td>
<td class="qtd">0</td>
<td class="val">0</td>
<td contenteditable oninput="calc()">${min||10}</td>
<td contenteditable>${obs||""}</td>
<td><button onclick="this.parentElement.parentElement.remove();calc()">🗑️</button></td>
`;

parseLances(r.cells[4]);
}

function addRow(){insertRow();}

function parseLances(c){
const r=c.parentElement;
const parts=c.innerText.split("+").map(n=>parseFloat(n)||0);
const total=parts.reduce((a,b)=>a+b,0);
r.querySelector(".qtd").innerText=total;
calc();
}

function calc(){

document.querySelectorAll("#table tbody tr").forEach(r=>{

const custo=parseFloat(r.cells[3].innerText)||0;
const metros=parseFloat(r.querySelector(".qtd").innerText)||0;
const min=parseFloat(r.cells[7].innerText)||0;

const valor=custo*metros;

r.querySelector(".val").innerText=valor.toFixed(2);

if(metros<min)
r.querySelector(".qtd").classList.add("low");
else
r.querySelector(".qtd").classList.remove("low");

});
}

function filterTable(){
const v=document.getElementById("search").value.toUpperCase();
document.querySelectorAll("#table tbody tr").forEach(tr=>{
tr.style.display=tr.innerText.toUpperCase().includes(v)?"":"none";
});
}

pullData();

</script>

</body>
</html>
