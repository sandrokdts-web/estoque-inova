<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inova Cloud Stock</title>

<style>

:root{
--verde:#008d4c;
--azul:#0056b3;
--bg:#f4f7f6;
--danger:#d9534f;
}

body{
font-family:Segoe UI;
background:var(--bg);
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid var(--verde);
margin-bottom:20px;
padding-bottom:10px;
}

.btn{
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
color:white;
}

.btn-save{background:var(--verde)}
.btn-add{background:var(--azul)}

table{
width:100%;
border-collapse:collapse;
}

th{
background:var(--verde);
color:white;
padding:10px;
font-size:13px;
text-align:left;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
}

.editable{
border-bottom:1px dashed #ccc;
}

.low{
background:var(--danger);
color:white;
padding:2px 6px;
border-radius:3px;
font-weight:bold;
}

#loading{
display:none;
font-weight:bold;
color:var(--verde);
}

</style>

</head>
<body>

<div class="container">

<header>

<div>
<h2 style="margin:0;color:#008d4c">Inova Informática</h2>
<small>Sistema de Estoque</small>
</div>

<div>
<button class="btn btn-add" onclick="addRow()">+ Item</button>
<button class="btn btn-save" onclick="pushData()">☁️ Salvar</button>
</div>

</header>

<input type="text" id="search" placeholder="Pesquisar..."
style="width:100%;padding:10px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px"
onkeyup="filterTable()">

<span id="loading">Sincronizando...</span>

<table id="table">

<thead>

<tr>
<th>Código</th>
<th>Produto</th>
<th>Marca</th>
<th>Custo</th>
<th>Lances</th>
<th>Total</th>
<th>Valor</th>
<th>Mín</th>
<th>Status</th>
<th></th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbyYqJqcl9WqJuNINX8TS2BA0lxwU2Wfi_sK7n748vomgtpNzeuNkgIPI5WQcIwOQfjM/exec";

function showLoading(v){
document.getElementById("loading").style.display=v?"inline":"none";
}

async function pullData(){

showLoading(true);

try{

const r=await fetch(WEB_APP_URL+"?action=ler");
const data=await r.json();

const tbody=document.querySelector("#table tbody");
tbody.innerHTML="";

data.forEach(i=>{
insertRow(i[0],i[1],i[2],i[3],i[4],i[5],i[6]);
});

calc();

}catch(e){

addRow();

}

showLoading(false);

}

async function pushData(){

showLoading(true);

const rows=document.querySelectorAll("#table tbody tr");

const data=[...rows].map(r=>[
r.cells[0].innerText,
r.cells[1].innerText,
r.cells[2].innerText,
r.cells[3].innerText,
r.cells[4].innerText,
r.cells[7].innerText,
r.cells[8].innerText
]);

try{

await fetch(WEB_APP_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({dados:data})
});

alert("Estoque salvo com sucesso");

}catch(e){

alert("Erro ao salvar");

}

showLoading(false);

}

function insertRow(c,p,m,custo,l,min,obs){

const tbody=document.querySelector("#table tbody");

const r=tbody.insertRow();

r.innerHTML=`

<td contenteditable class="editable">${c||""}</td>

<td contenteditable class="editable">${p||""}</td>

<td contenteditable class="editable">${m||""}</td>

<td contenteditable class="editable" oninput="calc()">${custo||0}</td>

<td contenteditable class="editable" oninput="parseLances(this)">${l||0}</td>

<td class="qtd">0</td>

<td class="val">0</td>

<td contenteditable class="editable" oninput="calc()">${min||10}</td>

<td contenteditable class="editable">${obs||""}</td>

<td><button onclick="this.parentElement.parentElement.remove();calc()">🗑️</button></td>

`;

parseLances(r.cells[4]);

}

function addRow(){
insertRow();
}

function parseLances(c){

const r=c.parentElement;

const parts=c.innerText.split("+").map(n=>parseFloat(n)||0);

const total=parts.reduce((a,b)=>a+b,0);

r.querySelector(".qtd").innerText=total;

calc();

}

function calc(){

document.querySelectorAll("#table tbody tr").forEach(r=>{

let custoTexto=r.cells[3].innerText.trim();

custoTexto=custoTexto.replace(",","."); 

const custo=parseFloat(custoTexto)||0;

const metros=parseFloat(r.querySelector(".qtd").innerText)||0;

const min=parseFloat(r.cells[7].innerText)||0;

const valor=custo*metros;

r.querySelector(".val").innerText=
valor.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

if(metros<min)
r.querySelector(".qtd").classList.add("low");
else
r.querySelector(".qtd").classList.remove("low");

});

}

function filterTable(){

const v=document.getElementById("search").value.toUpperCase();

document.querySelectorAll("#table tbody tr").forEach(tr=>{

tr.style.display=tr.innerText.toUpperCase().includes(v)?"":"none";

});

}

pullData();

</script>

</body>
</html>
