<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inova Estoque</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Segoe UI}
#loginTela{height:100vh;display:flex;justify-content:center;align-items:center;background:#1e1e1e}
.login-box{background:rgba(0,0,0,0.8);padding:40px;border-radius:12px;text-align:center;color:white;width:320px}
.login-box h2{color:#00c37a}
.login-box input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:5px}
.login-box button{width:100%;padding:10px;background:#00c37a;border:none;border-radius:5px;color:white;cursor:pointer}
#app{display:none;padding:20px;background:#f4f7f6;height:100vh}
.container{background:white;padding:20px;border-radius:10px}
header{display:flex;justify-content:space-between;border-bottom:3px solid #008d4c}
h2{color:#008d4c}
.top-buttons button{padding:10px;margin-left:5px;border:none;border-radius:5px;color:white;cursor:pointer}
.btn-estoque{background:#008d4c}
.btn-historico{background:#6c757d}
.btn-add{background:#0056b3}
.btn-save{background:#28a745}
.hidden{display:none}
</style>
</head>

<body>

<div id="loginTela">
<div class="login-box">
<h2>Inova Informática</h2>
<input id="user"><input id="pass" type="password">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app">
<div class="container">

<header>
<h2>Sistema</h2>
<div class="top-buttons">
<button class="btn-estoque" onclick="showEstoque()">📦 Estoque</button>
<button class="btn-historico" onclick="showHistorico()">📊 Histórico</button>
<button onclick="showRacks()" style="background:#ff9800">📦 Racks</button>
</div>
</header>

<div id="estoqueView"></div>

<div id="historicoView" class="hidden">
<h3>Histórico</h3>
<div id="histBody"></div>
</div>

<div id="racksView" class="hidden">

<h3>📦 Racks</h3>

<input id="buscaRack" placeholder="Buscar..." onkeyup="buscarRack()">
<div id="listaRacks"></div>

<h3>➕ Adicionar</h3>
<input id="codigo" placeholder="Código">
<input id="modelo" placeholder="Modelo">
<input id="marca" placeholder="Marca">
<input id="altura" placeholder="Altura">
<input id="prof" placeholder="Profundidade">
<input id="qtd" placeholder="Qtd">
<input id="custo" placeholder="Custo">

<button onclick="salvarRack()">Salvar</button>

<h3>📊 Dashboard</h3>
<canvas id="graficoRacks"></canvas>

</div>

</div>
</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbzOHa0XdhTQFhU2Z6soNAOT6r5ViJo0ZlUIOpVfRLo-jIIlgMWiL9pNN996-T6XqA77/exec";

let racks=[];

function login(){
loginTela.style.display="none";
app.style.display="block";
}

// 🔥 TELAS
function showEstoque(){
estoqueView.classList.remove("hidden");
historicoView.classList.add("hidden");
racksView.classList.add("hidden");
}

function showHistorico(){
historicoView.classList.remove("hidden");
estoqueView.classList.add("hidden");
racksView.classList.add("hidden");
}

function showRacks(){
racksView.classList.remove("hidden");
historicoView.classList.add("hidden");
estoqueView.classList.add("hidden");
carregarRacks();
}

// 🔵 RACKS
async function carregarRacks(){
const r=await fetch(WEB_APP_URL+"?action=racks");
racks=await r.json();
mostrarRacks(racks);
gerarGrafico();
}

function mostrarRacks(lista){

listaRacks.innerHTML="";

lista.forEach(r=>{

let cor="green";
if(r[7]==0) cor="red";
else if(r[7]<=2) cor="orange";

listaRacks.innerHTML+=`
<div style="border:1px solid #ccc;margin:5px;padding:10px">
<b>${r[1]}</b><br>
Qtd: <span style="color:${cor}">${r[7]}</span><br>

<a href="https://www.google.com/search?q=${r[1]}" target="_blank">
🔎 Ver modelo
</a>
</div>
`;
});
}

// 🔎 BUSCA
function buscarRack(){
const t=buscaRack.value.toLowerCase();
const f=racks.filter(r=>r[1].toLowerCase().includes(t));
mostrarRacks(f);
}

// ➕ SALVAR
async function salvarRack(){

await fetch(WEB_APP_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
action:"addRack",
codigo:codigo.value,
modelo:modelo.value,
marca:marca.value,
altura:altura.value,
profundidade:prof.value,
tipo:"Rack",
estado:"Novo",
quantidade:qtd.value,
custo:custo.value,
status:"Disponível",
obs:""
})
});

alert("Salvo!");
carregarRacks();
}

// 📊 GRÁFICO
function gerarGrafico(){

const nomes=racks.map(r=>r[1]);
const qtd=racks.map(r=>Number(r[7]));

new Chart(graficoRacks,{
type:"bar",
data:{
labels:nomes,
datasets:[{label:"Estoque",data:qtd}]
}
});
}

</script>

</body>
</html>
