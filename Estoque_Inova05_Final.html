<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inova Estoque</title>

<style>
body{margin:0;font-family:Segoe UI}
#app{display:none;padding:20px;background:#f4f7f6;height:100vh}
.container{background:white;padding:20px;border-radius:10px}

#search{
width:100%;
padding:15px;
font-size:18px;
border-radius:30px;
border:2px solid #ccc;
margin:10px 0;
}

table{width:100%;border-collapse:collapse}
th{background:#008d4c;color:white;padding:10px}
td{padding:8px;border-bottom:1px solid #ddd}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginTela" style="height:100vh;display:flex;justify-content:center;align-items:center;background:#1e1e1e">
<div style="background:#000;padding:40px;border-radius:10px;color:white;text-align:center;width:300px">
<h2>Inova</h2>

<input id="user" placeholder="Usuário" style="width:100%;padding:10px;margin:5px">
<input id="pass" type="password" placeholder="Senha" style="width:100%;padding:10px;margin:5px">

<button onclick="login()" style="width:100%;padding:10px;background:#00c37a;border:none;color:white">Entrar</button>
<p>Vazio = visualizar</p>
</div>
</div>

<!-- APP -->
<div id="app">
<div class="container">

<button onclick="addRow()">+ Item</button>

<input id="search" placeholder="Buscar..." onkeyup="filterTable()">

<table id="table">
<thead>
<tr>
<th>Código</th><th>Produto</th><th>Marca</th>
<th>Custo</th><th>Lances</th><th>Total</th>
<th>Valor</th><th>Mín</th><th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>
</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbzOHa0XdhTQFhU2Z6soNAOT6r5ViJo0ZlUIOpVfRLo-jIIlgMWiL9pNN996-T6XqA77/exec";

let tipoUsuario="view";

// LOGIN
function login(){

const u = document.getElementById("user").value;
const p = document.getElementById("pass").value;

if(u==="sandro" && p==="123"){
tipoUsuario="admin";
entrar();
return;
}

if(u==="" && p===""){
tipoUsuario="view";
entrar();
return;
}

alert("Login inválido");
}

function entrar(){
document.getElementById("loginTela").style.display="none";
document.getElementById("app").style.display="block";

pullData();
}

// BUSCA
function filterTable(){
const v=document.getElementById("search").value.toUpperCase();

document.querySelectorAll("#table tbody tr").forEach(tr=>{
tr.style.display=tr.innerText.toUpperCase().includes(v)?"":"none";
});
}

// CARREGAR DADOS
async function pullData(){

const r = await fetch(WEB_APP_URL+"?action=ler");
const data = await r.json();

const tbody=document.querySelector("#table tbody");
tbody.innerHTML="";

data.forEach(i=>{
insertRow(i[0],i[1],i[2],i[3],i[4],i[5],i[6]);
});
}

// + ITEM
function addRow(){
insertRow("", "", "", 0, 0, 10, "");
}

function insertRow(c,p,m,custo,l,min,obs){

const tbody=document.querySelector("#table tbody");
const r=tbody.insertRow();

r.innerHTML=`
<td contenteditable>${c}</td>
<td contenteditable>${p}</td>
<td contenteditable>${m}</td>
<td contenteditable>${custo}</td>
<td contenteditable>${l}</td>
<td>${l}</td>
<td>${(custo*l).toFixed(2)}</td>
<td contenteditable>${min}</td>
<td contenteditable>${obs}</td>
`;
}

// INICIAR
// ⚠️ NÃO chama pullData aqui (isso travava o login)

</script>

</body>
</html>
