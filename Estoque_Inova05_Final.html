<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inova Estoque</title>

<style>
body{margin:0;font-family:Segoe UI}

/* 🔍 BUSCA ESTILO GOOGLE */
#search{
width:100%;
padding:15px 20px;
font-size:18px;
border-radius:30px;
border:2px solid #ccc;
transition:0.3s;
margin:15px 0;
}

#search:focus{
border-color:#008d4c;
box-shadow:0 0 10px rgba(0,141,76,0.3);
}

/* layout */
#app{padding:20px;background:#f4f7f6;height:100vh}
.container{background:white;padding:20px;border-radius:10px}

header{display:flex;justify-content:space-between;border-bottom:3px solid #008d4c}

.top-buttons button{
padding:10px;margin-left:5px;border:none;border-radius:5px;color:white;cursor:pointer
}

.btn-estoque{background:#008d4c}
.btn-historico{background:#6c757d}
.btn-add{background:#0056b3}
.btn-save{background:#28a745}

table{width:100%;border-collapse:collapse}
th{background:#008d4c;color:white;padding:10px}
td{padding:8px;border-bottom:1px solid #ddd}

.low{background:red;color:white;padding:3px}
</style>
</head>

<body>

<div id="app">
<div class="container">

<header>
<h2>Sistema</h2>
<div class="top-buttons">
<button class="btn-estoque" onclick="showEstoque()">📦 Estoque</button>
<button class="btn-historico" onclick="showHistorico()">📊 Histórico</button>
<button onclick="showRacks()" style="background:#ff9800">📦 Racks</button>
<button class="btn-add" onclick="addRow()">+ Item</button>
<button class="btn-save" onclick="pushData()">Salvar</button>
</div>
</header>

<input id="search" placeholder="🔎 Buscar produto...">

<!-- ESTOQUE -->
<div id="estoqueView">
<table id="table">
<thead>
<tr>
<th>Código</th><th>Produto</th><th>Marca</th>
<th>Custo</th><th>Lances</th><th>Total</th>
<th>Valor</th><th>Mín</th><th>Status</th><th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- HISTORICO -->
<div id="historicoView" style="display:none"></div>

<!-- RACKS -->
<div id="racksView" style="display:none">
<h3>📦 Racks</h3>

<input id="buscaRack" placeholder="Buscar racks..." onkeyup="buscarRack()">

<div id="listaRacks"></div>
</div>

</div>
</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbzOHa0XdhTQFhU2Z6soNAOT6r5ViJo0ZlUIOpVfRLo-jIIlgMWiL9pNN996-T6XqA77/exec";

let racks=[];

// TELAS
function showEstoque(){
estoqueView.style.display="block";
historicoView.style.display="none";
racksView.style.display="none";
}

function showHistorico(){
historicoView.style.display="block";
estoqueView.style.display="none";
racksView.style.display="none";
}

function showRacks(){
racksView.style.display="block";
estoqueView.style.display="none";
historicoView.style.display="none";
carregarRacks();
}

// ESTOQUE
async function pullData(){
const r=await fetch(WEB_APP_URL+"?action=ler");
const data=await r.json();

const tbody=document.querySelector("#table tbody");
tbody.innerHTML="";

data.forEach(i=>{
insertRow(i[0],i[1],i[2],i[3],i[4],i[5],i[6]);
});
}

function insertRow(c,p,m,custo,l,min,obs){
const tbody=document.querySelector("#table tbody");
const r=tbody.insertRow();

r.innerHTML=`
<td>${c}</td>
<td>${p}</td>
<td>${m}</td>
<td>${custo}</td>
<td>${l}</td>
<td>${l}</td>
<td>${(custo*l).toFixed(2)}</td>
<td>${min}</td>
<td>${obs}</td>
<td></td>
`;
}

// 🔥 RACKS BONITO
async function carregarRacks(){
const r=await fetch(WEB_APP_URL+"?action=racks");
racks=await r.json();
mostrarRacks(racks);
}

function mostrarRacks(lista){
listaRacks.innerHTML="";

lista.forEach(r=>{
let cor="green";
if(r[7]==0) cor="red";
else if(r[7]<=2) cor="orange";

listaRacks.innerHTML+=`
<div style="border-left:5px solid #008d4c;background:#f9f9f9;margin:10px;padding:15px;border-radius:8px">
<b style="font-size:18px">${r[1]}</b><br>
Marca: ${r[2]}<br>
Altura: ${r[3]} | Prof: ${r[4]}<br>
Quantidade: <b style="color:${cor}">${r[7]}</b>
</div>
`;
});
}

function buscarRack(){
const t=buscaRack.value.toLowerCase();
const f=racks.filter(r=>r[1].toLowerCase().includes(t));
mostrarRacks(f);
}

// INICIAR
pullData();

</script>

</body>
</html>
