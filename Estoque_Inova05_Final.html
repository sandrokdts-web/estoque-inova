<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inova Estoque</title>

<style>
body{margin:0;font-family:Segoe UI}

#loginTela{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1e1e1e;
}

.login-box{
background:rgba(0,0,0,0.8);
padding:40px;
border-radius:12px;
text-align:center;
color:white;
width:320px;
}

.login-box h2{color:#00c37a}

.login-box input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

.login-box button{
width:100%;
padding:10px;
background:#00c37a;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

#app{display:none;padding:20px;background:#f4f7f6;height:100vh}

.container{
background:white;
padding:20px;
border-radius:10px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid #008d4c;
}

h2{color:#008d4c;margin:0}

.top-buttons button{
padding:10px;
margin-left:5px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.btn-estoque{background:#008d4c}
.btn-historico{background:#6c757d}
.btn-add{background:#0056b3}
.btn-save{background:#28a745}

.low{background:red;color:white}
.ok{background:#28a745;color:white}
</style>
</head>

<body>

<div id="loginTela">
<div class="login-box">
<h2>Inova Informática</h2>
<p>Sistema de Estoque</p>
<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app">
<div class="container">

<header>
<div>
<h2>Inova Informática</h2>
<small>Sistema de Estoque</small>
</div>

<div class="top-buttons">
<button class="btn-estoque" onclick="showEstoque()">📦</button>
<button class="btn-historico" onclick="showHistorico()">📊</button>
<button onclick="showRacks()" style="background:#ff9800">🗄️</button>
<button class="btn-add" onclick="addRow()">+</button>
<button class="btn-save" onclick="pushData()">Salvar</button>
</div>

</header>

<!-- ESTOQUE -->
<div id="estoqueView">
<input id="search" onkeyup="filterTable()" placeholder="Pesquisar...">
<table id="table"><tbody></tbody></table>
</div>

<!-- HISTORICO -->
<div id="historicoView" class="hidden">
<h3>Histórico</h3>
<table><tbody id="histBody"></tbody></table>
</div>

<!-- RACKS -->
<div id="racksView" class="hidden">

<h3>🗄️ Racks</h3>

<input id="searchRacks" onkeyup="filterRacks()" placeholder="Pesquisar rack">

<br><br>

<button onclick="addRack()">+ Rack</button>
<button onclick="saveRacks()">Salvar</button>

<h4 id="totalRacks">Total: 0</h4>

<table>
<tbody id="racksBody"></tbody>
</table>

</div>

</div>
</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbzOHa0XdhTQFhU2Z6soNAOT6r5ViJo0ZlUIOpVfRLo-jIIlgMWiL9pNN996-T6XqA77/exec";

/* LOGIN */
let tipoUsuario="";

const usuarios=[{user:"sandro",senha:"123",tipo:"admin"}];

function login(){
const u=user.value;
const p=pass.value;

if(u==="" && p===""){tipoUsuario="view";entrar();return;}

const ok=usuarios.find(x=>x.user==u && x.senha==p);
if(ok){tipoUsuario=ok.tipo;entrar();}else alert("Login inválido");
}

function entrar(){
loginTela.style.display="none";
app.style.display="block";
pullData();
}

/* VIEWS */
function showEstoque(){
estoqueView.classList.remove("hidden");
historicoView.classList.add("hidden");
racksView.classList.add("hidden");
}

function showHistorico(){
estoqueView.classList.add("hidden");
historicoView.classList.remove("hidden");
racksView.classList.add("hidden");
loadHistorico();
}

function showRacks(){
estoqueView.classList.add("hidden");
historicoView.classList.add("hidden");
racksView.classList.remove("hidden");
loadRacks();
}

/* RACKS */
async function loadRacks(){
const r=await fetch(WEB_APP_URL+"?action=racks");
const data=await r.json();

racksBody.innerHTML="";
let total=0;

data.forEach(i=>{
const qtd=parseInt(i[1])||0;
total+=qtd;

const cor=qtd===0?"low":"ok";

racksBody.innerHTML+=`
<tr>
<td contenteditable>${i[0]}</td>
<td contenteditable class="${cor}">${qtd}</td>
<td><button onclick="this.parentElement.parentElement.remove();calcTotalRacks()">🗑️</button></td>
</tr>`;
});

totalRacks.innerText="Total: "+total;
}

function addRack(){
racksBody.innerHTML+=`
<tr>
<td contenteditable>Novo Rack</td>
<td contenteditable>0</td>
<td><button onclick="this.parentElement.parentElement.remove();calcTotalRacks()">🗑️</button></td>
</tr>`;
}

function calcTotalRacks(){
let total=0;
document.querySelectorAll("#racksBody tr").forEach(r=>{
const qtd=parseInt(r.cells[1].innerText)||0;
total+=qtd;
r.cells[1].className=qtd===0?"low":"ok";
});
totalRacks.innerText="Total: "+total;
}

function filterRacks(){
const v=searchRacks.value.toUpperCase();
document.querySelectorAll("#racksBody tr").forEach(tr=>{
tr.style.display=tr.innerText.toUpperCase().includes(v)?"":"none";
});
}

async function saveRacks(){

const rows=document.querySelectorAll("#racksBody tr");

const data=[...rows].map(r=>[
r.cells[0].innerText,
r.cells[1].innerText
]);

await fetch(WEB_APP_URL,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({tipo:"racks",dados:data})
});

alert("Racks salvo ✔️");
}

</script>

</body>
</html>
