<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inova Estoque</title>

<style>
body{margin:0;font-family:Segoe UI}

/* LOGIN */
#loginTela{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1e1e1e;
}

.login-box{
background:#000;
padding:40px;
border-radius:10px;
color:white;
text-align:center;
width:300px;
}

.login-box input{
width:100%;
padding:10px;
margin:5px 0;
}

/* APP */
#app{display:none;padding:20px;background:#f4f7f6;height:100vh}
.container{background:white;padding:20px;border-radius:10px}

header{
display:flex;
justify-content:space-between;
border-bottom:3px solid #008d4c;
}

.top-buttons button{
padding:10px;margin-left:5px;border:none;border-radius:5px;color:white;cursor:pointer
}

.btn-estoque{background:#008d4c}
.btn-historico{background:#6c757d}
.btn-racks{background:#ff9800}
.btn-add{background:#0056b3}
.btn-save{background:#28a745}

/* BUSCA */
#search{
width:100%;
padding:15px;
font-size:18px;
border-radius:30px;
border:2px solid #ccc;
margin:15px 0;
}

/* TABELA */
table{width:100%;border-collapse:collapse}
th{background:#008d4c;color:white;padding:10px}
td{padding:8px;border-bottom:1px solid #ddd}

.low{background:red;color:white;padding:3px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginTela">
<div class="login-box">
<h2>Inova Informática</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<p>Vazio = visualizar</p>
</div>
</div>

<!-- APP -->
<div id="app">
<div class="container">

<header>
<h2>Sistema</h2>
<div class="top-buttons">
<button class="btn-estoque" onclick="showEstoque()">📦 Estoque</button>
<button class="btn-historico" onclick="showHistorico()">📊 Histórico</button>
<button class="btn-racks" onclick="showRacks()">📦 Racks</button>
<button class="btn-add" onclick="addRow()">+ Item</button>
<button class="btn-save" onclick="pushData()">Salvar</button>
</div>
</header>

<input id="search" placeholder="🔎 Buscar..." onkeyup="filterTable()">

<!-- ESTOQUE -->
<div id="estoqueView">
<table id="table">
<thead>
<tr>
<th>Código</th><th>Produto</th><th>Marca</th>
<th>Custo</th><th>Lances</th><th>Total</th>
<th>Valor</th><th>Mín</th><th>Status</th><th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- HISTÓRICO -->
<div id="historicoView" style="display:none">
<h3>Histórico</h3>
<div id="hist"></div>
</div>

<!-- RACKS -->
<div id="racksView" style="display:none">
<h3>Racks</h3>
<div id="listaRacks"></div>
</div>

</div>
</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbzOHa0XdhTQFhU2Z6soNAOT6r5ViJo0ZlUIOpVfRLo-jIIlgMWiL9pNN996-T6XqA77/exec";

let tipoUsuario="view";
let racks=[];

// LOGIN
function login(){

const u=document.getElementById("user").value.trim();
const p=document.getElementById("pass").value.trim();

if(u==="sandro" && p==="123"){
tipoUsuario="admin";
entrar();
return;
}

if(u==="" && p===""){
tipoUsuario="view";
entrar();
return;
}

alert("Login inválido");
}

function entrar(){
loginTela.style.display="none";
app.style.display="block";

if(tipoUsuario==="view"){
bloquearEdicao();
}

pullData();
}

// BLOQUEIO
function bloquearEdicao(){
document.querySelectorAll("[contenteditable]").forEach(e=>{
e.setAttribute("contenteditable","false");
});
document.querySelectorAll(".btn-add,.btn-save").forEach(b=>{
b.style.display="none";
});
}

// TELAS
function showEstoque(){
estoqueView.style.display="block";
historicoView.style.display="none";
racksView.style.display="none";
}

function showHistorico(){
historicoView.style.display="block";
estoqueView.style.display="none";
racksView.style.display="none";
}

function showRacks(){
racksView.style.display="block";
estoqueView.style.display="none";
historicoView.style.display="none";
carregarRacks();
}

// BUSCA
function filterTable(){
const v=search.value.toUpperCase();
document.querySelectorAll("#table tbody tr").forEach(tr=>{
tr.style.display=tr.innerText.toUpperCase().includes(v)?"":"none";
});
}

// ESTOQUE
async function pullData(){
const r=await fetch(WEB_APP_URL+"?action=ler");
const data=await r.json();

const tbody=document.querySelector("#table tbody");
tbody.innerHTML="";

data.forEach(i=>{
insertRow(i[0],i[1],i[2],i[3],i[4],i[5],i[6]);
});
}

// SALVAR
async function pushData(){

const rows=document.querySelectorAll("#table tbody tr");

const data=[...rows].map(r=>[
r.cells[0].innerText,
r.cells[1].innerText,
r.cells[2].innerText,
r.cells[3].innerText,
r.cells[4].innerText,
r.cells[7].innerText,
r.cells[8].innerText
]);

await fetch(WEB_APP_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({dados:data})
});

alert("Salvo!");
}

// + ITEM
function addRow(){
insertRow("", "", "", 0, 0, 10, "");
}

function insertRow(c,p,m,custo,l,min,obs){

const tbody=document.querySelector("#table tbody");
const r=tbody.insertRow();

r.innerHTML=`
<td contenteditable>${c}</td>
<td contenteditable>${p}</td>
<td contenteditable>${m}</td>
<td contenteditable oninput="calc()">${custo}</td>
<td contenteditable oninput="parseLances(this)">${l}</td>
<td class="qtd">0</td>
<td class="val">0</td>
<td contenteditable oninput="calc()">${min}</td>
<td contenteditable>${obs}</td>
<td><button onclick="this.parentElement.parentElement.remove();calc()">🗑️</button></td>
`;

parseLances(r.cells[4]);
}

function parseLances(c){
const r=c.parentElement;
const parts=c.innerText.split("+").map(n=>parseFloat(n)||0);
const total=parts.reduce((a,b)=>a+b,0);
r.querySelector(".qtd").innerText=total;
calc();
}

function calc(){
document.querySelectorAll("#table tbody tr").forEach(r=>{
const custo=parseFloat(r.cells[3].innerText)||0;
const metros=parseFloat(r.querySelector(".qtd").innerText)||0;
const min=parseFloat(r.cells[7].innerText)||0;

const valor=custo*metros;
r.querySelector(".val").innerText=valor.toFixed(2);

if(metros<min)
r.querySelector(".qtd").classList.add("low");
else
r.querySelector(".qtd").classList.remove("low");
});
}

// RACKS
async function carregarRacks(){
const r=await fetch(WEB_APP_URL+"?action=racks");
racks=await r.json();

listaRacks.innerHTML="";
racks.forEach(r=>{
listaRacks.innerHTML+=`
<div style="margin:10px;padding:10px;border-left:5px solid #008d4c">
<b>${r[1]}</b><br>Qtd: ${r[7]}
</div>
`;
});
}

</script>

</body>
</html>
